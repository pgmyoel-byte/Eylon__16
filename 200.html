<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Eylon 💖 Leyda</title>

<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Poppins:wght@300;500&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}

body{
height:100vh;
overflow:hidden;
background:linear-gradient(135deg,#ff9ecb,#ffd6ec,#fff0f6);
display:flex;
justify-content:center;
align-items:center;
color:white;
text-align:center;
}

/* PASSWORD */
#passwordScreen{
position:fixed;inset:0;
background:linear-gradient(135deg,#ff9ecb,#ffc3e6);
display:flex;justify-content:center;align-items:center;
z-index:10000;
}
.box{background:white;color:#444;padding:30px;border-radius:20px;}
input{padding:10px;border-radius:10px;border:1px solid #ccc;margin-top:10px;}

/* START */
#startScreen{
position:fixed;inset:0;
background:black;
display:none;
justify-content:center;align-items:center;
cursor:pointer;z-index:9999;
font-size:24px;
}

/* CONTENT */
.container{opacity:0;transform:translateY(40px);transition:1.5s;}
.show{opacity:1;transform:translateY(0);}

h1{font-family:'Great Vibes',cursive;font-size:60px;}

/* SLIDER */
.slider{
width:260px;height:320px;margin:20px auto;
border-radius:20px;overflow:hidden;
position:relative;
}
.slide{
position:absolute;width:100%;height:100%;
background-size:cover;background-position:center;
opacity:0;transition:1.2s ease;
cursor:pointer;
}
.slide.active{opacity:1;}

/* POPUP */
#imagePopup{
position:fixed;inset:0;
background:rgba(0,0,0,.85);
display:flex;justify-content:center;align-items:center;
opacity:0;pointer-events:none;transition:.3s;
}
#imagePopup.show{opacity:1;pointer-events:auto;}
#imagePopup img{max-width:90%;max-height:90%;border-radius:20px;}

button{
margin-top:10px;padding:10px 20px;
border:none;border-radius:20px;
background:#ff6fa5;color:white;cursor:pointer;
}
</style>
</head>

<body>

<!-- PASSWORD -->
<div id="passwordScreen">
<div class="box">
<h2>Masukkan Password 💌</h2>
<input type="password" id="passInput">
<br><br>
<button onclick="checkPassword()">Masuk</button>
<p id="wrong" style="color:red;display:none;">Password salah</p>
</div>
</div>

<!-- START -->
<div id="startScreen">Klik untuk Membuka 💖</div>

<!-- CONTENT -->
<div class="container" id="content">
<h1>Eylon & Leyda</h1>

<div class="slider" id="slider"></div>

<div id="typing"></div>
<div id="dayCounter"></div>
<div id="countdown"></div>

<button onclick="toggleMusic()">Play / Pause Lagu 🎵</button>
</div>

<!-- POPUP IMAGE -->
<div id="imagePopup" onclick="closeImage()">
<img id="popupImg">
</div>

<audio id="musik" loop>
<source src="lagu.mp3" type="audio/mpeg">
</audio>

<script>
// PASSWORD
const passwordBenar="160825";
function checkPassword(){
if(passInput.value===passwordBenar){
passwordScreen.style.display="none";
startScreen.style.display="flex";
}else{wrong.style.display="block";}
}

// START
startScreen.onclick=function(){
musik.play().catch(()=>{});
startScreen.style.display="none";
content.classList.add("show");

loadFotos();
startSlider();
startTyping();
startTime();
};

// AUTO LOAD FOTO (1-47)
function loadFotos(){
const totalFoto = 47;
const slider = document.getElementById("slider");

for(let i=1;i<=totalFoto;i++){
const div=document.createElement("div");
div.className="slide";
if(i===1) div.classList.add("active");

div.style.backgroundImage=`url('foto${i}.jpg')`;
div.onclick=()=>openImage(`foto${i}.jpg`);

slider.appendChild(div);
}
}

// SLIDER AUTO
function startSlider(){
const slides=document.querySelectorAll(".slide");
let i=0;
setInterval(()=>{
slides[i].classList.remove("active");
i=(i+1)%slides.length;
slides[i].classList.add("active");
},3500);
}

// TYPING
const text="16 Agustus 2025 adalah awal cerita kita.";
let x=0;
function startTyping(){
const t=setInterval(()=>{
typing.innerHTML+=text[x];
x++;
if(x>=text.length)clearInterval(t);
},40);
}

// TIMER
const targetDate=new Date("2026-08-16T00:00:00");
function startTime(){
setInterval(()=>{
const now=new Date();
const sejak=new Date("2025-08-16T00:00:00");

const totalHari=Math.floor((now-sejak)/(1000*60*60*24));
const sisa=targetDate-now;

const hari=Math.floor(sisa/(1000*60*60*24));
const jam=Math.floor((sisa/(1000*60*60))%24);
const menit=Math.floor((sisa/(1000*60))%60);
const detik=Math.floor((sisa/1000)%60);

dayCounter.innerHTML=`Sekarang sudah <b>${totalHari} hari</b> bersama 💕`;
countdown.innerHTML=`Menuju 16 Agustus 2026:<br>${hari} hari ${jam} jam ${menit} menit ${detik} detik`;
},1000);
}

// MUSIC
function toggleMusic(){
musik.paused?musik.play():musik.pause();
}

// POPUP IMAGE
function openImage(src){
popupImg.src=src;
imagePopup.classList.add("show");
}
function closeImage(){
imagePopup.classList.remove("show");
}
</script>

</body>
</html>
